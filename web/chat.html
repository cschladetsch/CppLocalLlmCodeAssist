<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CppCoder — Chat</title>
<style>
  :root {
    --bg: #05070d;
    --panel: #0b0f1a;
    --panel-2: #0d1220;
    --border: #1b2436;
    --border-soft: #141b2a;
    --text: #e7ecf5;
    --muted: #7c8aa5;
    --dim: #4b5875;
    --blue: #3b82f6;
    --blue-bright: #63a4ff;
    --blue-soft: rgba(59, 130, 246, 0.14);
    --green: #22c55e;
    --green-bright: #4ade80;
    --green-soft: rgba(34, 197, 94, 0.14);
    --red: #ef4444;
    --red-soft: rgba(239, 68, 68, 0.12);
    --gray: #3d4a63;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    height: 100%;
  }

  body {
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(59,130,246,0.07), transparent 55%),
      radial-gradient(ellipse at 85% 15%, rgba(34,197,94,0.05), transparent 50%);
    display: flex;
    flex-direction: column;
  }

  .wrap {
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
    padding: 24px 24px 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ---------- Header ---------- */

  .top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--blue-bright);
    background: var(--blue-soft);
    border: 1px solid rgba(59,130,246,0.35);
    padding: 5px 10px;
    border-radius: 5px;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(20px, 3vw, 26px);
    font-weight: 650;
    letter-spacing: -0.01em;
    margin: 12px 0 2px;
    line-height: 1.15;
  }

  .subtitle {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 16px;
  }

  a.navlink {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    white-space: nowrap;
  }
  a.navlink:hover { border-color: var(--blue); color: var(--blue-bright); }

  /* ---------- Controls ---------- */

  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 14px;
  }

  select {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 10px;
    min-width: 220px;
  }
  select:focus-visible { outline: 2px solid var(--blue-bright); outline-offset: 1px; }

  button {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 14px;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  button:hover { border-color: var(--blue); background: rgba(59,130,246,0.08); }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .status {
    margin-left: auto;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }
  .status .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--dim);
  }
  .status.ok .dot { background: var(--green-bright); box-shadow: 0 0 6px var(--green-bright); }
  .status.err .dot { background: var(--red); box-shadow: 0 0 6px var(--red); }

  /* ---------- Chat area ---------- */

  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    min-height: 0;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .empty-hint {
    margin: auto;
    text-align: center;
    color: var(--dim);
    font-family: var(--mono);
    font-size: 12px;
    max-width: 380px;
    line-height: 1.6;
  }

  .msg { display: flex; flex-direction: column; gap: 4px; max-width: 82%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; align-items: flex-start; }

  .msg .role {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--dim);
    padding: 0 2px;
  }

  .bubble {
    border-radius: 12px;
    padding: 10px 13px;
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.user .bubble {
    background: var(--blue-soft);
    border: 1px solid rgba(59,130,246,0.3);
    color: var(--text);
  }
  .msg.assistant .bubble {
    background: var(--panel-2);
    border: 1px solid var(--border-soft);
    color: var(--text);
  }
  .msg.assistant .bubble.error {
    background: var(--red-soft);
    border: 1px solid rgba(239,68,68,0.35);
    color: #ffb4b4;
  }
  .bubble code {
    font-family: var(--mono);
    font-size: 12.5px;
    background: rgba(255,255,255,0.06);
    padding: 1px 5px;
    border-radius: 4px;
  }
  .bubble pre {
    font-family: var(--mono);
    font-size: 12.5px;
    background: #05070d;
    border: 1px solid var(--border-soft);
    border-radius: 8px;
    padding: 10px 12px;
    overflow-x: auto;
    margin: 6px 0;
  }
  .bubble pre code { background: none; padding: 0; }

  .cursor-blink::after {
    content: "▍";
    color: var(--blue-bright);
    animation: blink 1s step-start infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ---------- Composer ---------- */

  .composer {
    display: flex;
    gap: 10px;
    padding: 12px;
    border-top: 1px solid var(--border);
    background: var(--panel-2);
  }

  textarea {
    flex: 1;
    resize: none;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    min-height: 44px;
    max-height: 160px;
    line-height: 1.4;
  }
  textarea:focus-visible { outline: 2px solid var(--blue-bright); outline-offset: 1px; }

  .send-btn {
    background: var(--blue);
    border-color: var(--blue);
    align-self: flex-end;
  }
  .send-btn:hover { background: #2f6fe0; }

  .footer-note {
    text-align: center;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--dim);
    padding: 10px 0 18px;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div>
      <h1>Chat</h1>
    </div>
    <a class="navlink" href="./index.html">← Research Task Graph</a>
  </div>

  <div class="controls">
    <select id="modelSelect" disabled>
      <option>Loading models…</option>
    </select>
    <button id="btnRefreshModels" title="Re-fetch model list from Ollama">↻ Refresh</button>
    <button id="btnNewChat">New chat</button>
    <div class="status" id="statusBar"><span class="dot"></span><span id="statusText">Connecting…</span></div>
  </div>

  <div class="chat-panel">
    <div class="messages" id="messages">
      <div class="empty-hint" id="emptyHint">
        No messages yet. Pick a model above and say something.<br>
        Conversation is kept in your browser (localStorage) only — nothing
        is sent anywhere except your local Ollama instance.
      </div>
    </div>
    <div class="composer">
      <textarea id="input" placeholder="Message… (Enter to send, Shift+Enter for a new line)" rows="1"></textarea>
      <button class="send-btn" id="btnSend">Send</button>
    </div>
  </div>

  <p class="footer-note">served locally by cppcoder --serve · proxies straight through to Ollama's /api/chat</p>

</div>

<script>
(function () {
  "use strict";

  const STORAGE_KEY = "cppcoder.chat.v1";
  const MODEL_KEY = "cppcoder.chat.model";

  const messagesEl = document.getElementById("messages");
  const emptyHint = document.getElementById("emptyHint");
  const modelSelect = document.getElementById("modelSelect");
  const btnRefreshModels = document.getElementById("btnRefreshModels");
  const btnNewChat = document.getElementById("btnNewChat");
  const statusBar = document.getElementById("statusBar");
  const statusText = document.getElementById("statusText");
  const input = document.getElementById("input");
  const btnSend = document.getElementById("btnSend");

  /** @type {{role: string, content: string}[]} */
  let history = [];
  let sending = false;

  function loadHistory() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) history = JSON.parse(raw);
    } catch (e) { history = []; }
  }

  function saveHistory() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); } catch (e) {}
  }

  function setStatus(kind, text) {
    statusBar.className = "status " + kind;
    statusText.textContent = text;
  }

  // Minimal, safe-ish markdown-lite: escapes HTML, then re-introduces
  // ```code fences``` and `inline code`. No raw HTML ever passes through.
  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function renderContent(raw) {
    const escaped = escapeHtml(raw);
    const withBlocks = escaped.replace(/```([a-zA-Z0-9_+-]*)\n?([\s\S]*?)```/g, function (_, lang, code) {
      return "<pre><code>" + code.replace(/\n$/, "") + "</code></pre>";
    });
    return withBlocks.replace(/`([^`\n]+)`/g, "<code>$1</code>");
  }

  function renderAll() {
    messagesEl.innerHTML = "";
    if (history.length === 0) {
      messagesEl.appendChild(emptyHint);
      return;
    }
    for (const m of history) {
      messagesEl.appendChild(makeBubble(m.role, m.content, false));
    }
    scrollToBottom();
  }

  function makeBubble(role, content, isError) {
    const wrap = document.createElement("div");
    wrap.className = "msg " + (role === "user" ? "user" : "assistant");
    const roleEl = document.createElement("div");
    roleEl.className = "role";
    roleEl.textContent = role === "user" ? "You" : "Assistant";
    const bubble = document.createElement("div");
    bubble.className = "bubble" + (isError ? " error" : "");
    bubble.innerHTML = renderContent(content || "");
    wrap.appendChild(roleEl);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    return wrap;
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function loadModels() {
    modelSelect.disabled = true;
    modelSelect.innerHTML = "<option>Loading models…</option>";
    try {
      const res = await fetch("/api/models");
      const data = await res.json();
      if (!res.ok) {
        setStatus("err", data.error || "Ollama unreachable");
        modelSelect.innerHTML = "<option>(no models — Ollama unreachable)</option>";
        return;
      }
      const models = data.models || [];
      if (models.length === 0) {
        setStatus("err", "Ollama reachable, but no models pulled yet");
        modelSelect.innerHTML = "<option>(none pulled — try: ollama pull " + (data.default || "qwen2.5-coder:7b") + ")</option>";
        return;
      }
      modelSelect.innerHTML = "";
      for (const name of models) {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        modelSelect.appendChild(opt);
      }
      const remembered = localStorage.getItem(MODEL_KEY);
      if (remembered && models.includes(remembered)) {
        modelSelect.value = remembered;
      } else if (models.includes(data.default)) {
        modelSelect.value = data.default;
      }
      modelSelect.disabled = false;
      setStatus("ok", models.length + " model" + (models.length === 1 ? "" : "s") + " available");
    } catch (e) {
      setStatus("err", "Could not reach chat server");
      modelSelect.innerHTML = "<option>(server unreachable)</option>";
    }
  }

  modelSelect.addEventListener("change", function () {
    localStorage.setItem(MODEL_KEY, modelSelect.value);
  });
  btnRefreshModels.addEventListener("click", loadModels);

  btnNewChat.addEventListener("click", function () {
    if (history.length && !confirm("Clear the current conversation?")) return;
    history = [];
    saveHistory();
    renderAll();
  });

  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  input.addEventListener("input", function () {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 160) + "px";
  });
  btnSend.addEventListener("click", send);

  async function send() {
    if (sending) return;
    const text = input.value.trim();
    if (!text) return;
    const model = modelSelect.value;
    if (!model || modelSelect.disabled) {
      setStatus("err", "No model selected");
      return;
    }

    input.value = "";
    input.style.height = "auto";
    sending = true;
    btnSend.disabled = true;

    history.push({ role: "user", content: text });
    saveHistory();
    renderAll();

    const assistantWrap = makeBubble("assistant", "", false);
    const bubble = assistantWrap.querySelector(".bubble");
    bubble.classList.add("cursor-blink");
    scrollToBottom();

    let assistantContent = "";
    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: model, messages: history }),
      });

      if (!res.body) throw new Error("Streaming not supported by this browser");

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let sawError = false;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        let newlineIdx;
        while ((newlineIdx = buffer.indexOf("\n")) >= 0) {
          const line = buffer.slice(0, newlineIdx).trim();
          buffer = buffer.slice(newlineIdx + 1);
          if (!line) continue;

          let obj;
          try { obj = JSON.parse(line); } catch (e) { continue; }

          if (obj.error) {
            sawError = true;
            assistantContent = obj.error;
            bubble.classList.add("error");
            bubble.classList.remove("cursor-blink");
            bubble.innerHTML = renderContent(assistantContent);
            continue;
          }
          if (obj.message && typeof obj.message.content === "string") {
            assistantContent += obj.message.content;
            bubble.innerHTML = renderContent(assistantContent) + "<span class=\"cursor-blink\"></span>";
            scrollToBottom();
          }
        }
      }

      bubble.classList.remove("cursor-blink");
      bubble.innerHTML = renderContent(assistantContent);
      if (!sawError) {
        history.push({ role: "assistant", content: assistantContent });
        saveHistory();
        setStatus("ok", "Ready");
      } else {
        setStatus("err", "Ollama request failed");
      }
    } catch (e) {
      bubble.classList.add("error");
      bubble.classList.remove("cursor-blink");
      bubble.innerHTML = renderContent("Request failed: " + e.message);
      setStatus("err", "Request failed");
    } finally {
      sending = false;
      btnSend.disabled = false;
      input.focus();
    }
  }

  loadHistory();
  renderAll();
  loadModels();
})();
</script>
</body>
</html>
